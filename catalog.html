<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Browse the full Studio LHB pattern catalog — painterly, textured, organic fabric and wallpaper designs on Spoonflower.">
  <title>Catalog — Studio LHB</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .catalog-controls { max-width: 980px; margin: 0 auto; padding: 1.5rem 2rem 0.5rem; }
    .search-bar { width: 100%; padding: 10px 16px; font-family: 'Lato', sans-serif; font-size: 14px; border: 1px solid #d8cfc5; border-radius: 20px; background: #fff; color: #3a3530; margin-bottom: 1rem; box-sizing: border-box; }
    .search-bar:focus { outline: none; border-color: #0f4d5e; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
    .filter-btn { font-family: 'Lato', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; border: 1px solid #ba6ca5; background: transparent; color: #ba6ca5; cursor: pointer; font-weight: 600; }
    .filter-btn.active, .filter-btn:hover { background: #ba6ca5; color: #fff; }
    .catalog-grid { max-width: 980px; margin: 0 auto; padding: 0 2rem 3rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
    .catalog-card { display: flex; flex-direction: column; }
    .card-img-wrap { position: relative; width: 100%; aspect-ratio: 1; overflow: hidden; border-radius: 8px; margin-bottom: 0.6rem; }
    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .coming-soon-wrap .card-img { filter: brightness(0.7); }
    .coming-soon-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ba6ca5; color: white; font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; white-space: nowrap; }
    .card-title { font-family: 'Lato', sans-serif; font-size: 13px; color: #3a3530; margin-bottom: 0.5rem; line-height: 1.4; flex: 1; }
    .card-btn { font-size: 10px; padding: 7px 12px; display: inline-block; align-self: flex-start; }
    .no-results { grid-column: 1 / -1; text-align: center; font-family: 'Lato', sans-serif; color: #8a7a6a; padding: 3rem 0; font-size: 14px; }
    .catalog-card.hidden { display: none; }
    .result-count { font-family: 'Lato', sans-serif; font-size: 12px; color: #8a7a6a; margin-bottom: 0.5rem; letter-spacing: 1px; }
    @media (max-width: 600px) { .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; padding: 0 1rem 2rem; } }
  </style>
</head>
<body>
<div class="site-wrap">
<header class="site-header">
  <img src="images/2026 Studio LHB.png" alt="Studio LHB" class="tape-badge">
  <p class="header-sub">the full collection</p>
</header>
<nav class="btn-section">
  <div class="btn-row">
    <a class="btn" href="index.html">Home</a>
    <a class="btn" href="https://www.spoonflower.com/profiles/studiolhb" target="_blank">Spoonflower</a>
    <a class="btn" href="https://ko-fi.com/studiolhb" target="_blank">Ko-Fi</a>
    <a class="btn" href="https://www.ebay.com/usr/studiolhb" target="_blank">ACEOs</a>
    <a class="btn" href="freebies.html">Freebies</a>
  </div>
    <div class="btn-row">
    <a class="btn" href="https://studio-lhb.kit.com/free-coloring-sheet" target="_blank">Newsletter</a>
    <a class="btn" href="https://www.pinterest.com/studiolhb/" target="_blank">Pinterest</a>
    <a class="btn" href="https://medium.com/@studiolhb" target="_blank">Blog</a>
  </div>
</nav>
<div class="catalog-controls">
  <input class="search-bar" type="text" id="searchInput" placeholder="Search designs...">
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="abstract">Abstract</button>
    <button class="filter-btn" data-filter="animal">Animals</button>
    <button class="filter-btn" data-filter="blender">Blenders</button>
    <button class="filter-btn" data-filter="botanical">Botanical</button>
    <button class="filter-btn" data-filter="baby-kids">Baby & Kids</button>
    <button class="filter-btn" data-filter="coastal">Coastal</button>
    <button class="filter-btn" data-filter="fall">Fall</button>
    <button class="filter-btn" data-filter="food-kitchen">Food & Kitchen</button>
    <button class="filter-btn" data-filter="geometric">Geometric</button>
    <button class="filter-btn" data-filter="holiday">Holiday</button>
    <button class="filter-btn" data-filter="night-sky">Night Sky</button>
    <button class="filter-btn" data-filter="origami">Origami</button>
    <button class="filter-btn" data-filter="rainbow">Rainbow</button>
    <button class="filter-btn" data-filter="recreation">Recreation</button>
    <button class="filter-btn" data-filter="spring">Spring</button>
    <button class="filter-btn" data-filter="summer">Summer</button>
    <button class="filter-btn" data-filter="vintage-retro">Vintage & Retro</button>
    <button class="filter-btn" data-filter="winter">Winter</button>
  </div>
  <p class="result-count" id="resultCount"></p>
</div>
<div class="catalog-grid" id="catalogGrid"></div>
<footer class="site-footer">
  <p>© 2026 Studio LHB — All Rights Reserved</p>
</footer>
</div>
<script src="designs.js"></script>
<script>
  const grid = document.getElementById('catalogGrid');
  const searchInput = document.getElementById('searchInput');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const resultCount = document.getElementById('resultCount');
  let activeFilter = 'all';

 [...designs].sort((a, b) => a.name.localeCompare(b.name)).forEach(d => {
    const card = document.createElement('div');
    card.className = 'catalog-card';
    card.dataset.cats = d.cats.join(' ');
    card.dataset.name = d.name.toLowerCase();
    if (d.status === 'coming soon') {
      card.innerHTML = `<div class="card-img-wrap coming-soon-wrap"><img src="images/${d.img}" alt="${d.alt}" class="card-img" loading="lazy"><div class="coming-soon-badge">Coming Soon</div></div><p class="card-title">${d.name}</p><a class="btn card-btn";
    } else {
      card.innerHTML = `<div class="card-img-wrap"><img src="images/${d.img}" alt="${d.alt}" class="card-img" loading="lazy"></div><p class="card-title">${d.name}</p><a class="btn card-btn" href="${d.url}" target="_blank">Shop Colorways & Scales</a>`;
    }
    grid.appendChild(card);
  });
const BATCH = 24;
let showing = BATCH;

function updateResults() {
  const query = searchInput.value.toLowerCase().trim();
  const cards = document.querySelectorAll('.catalog-card');
  let visible = 0;
  let shown = 0;
  cards.forEach(card => {
    const matchesSearch = !query || card.dataset.name.includes(query);
    const matchesFilter = activeFilter === 'all' || card.dataset.cats.includes(activeFilter);
    if (matchesSearch && matchesFilter) {
      visible++;
      if (shown < showing) {
        card.classList.remove('hidden');
        shown++;
      } else {
        card.classList.add('hidden');
      }
    } else {
      card.classList.add('hidden');
    }
  });
  resultCount.textContent = visible === 1 ? '1 design' : shown + ' of ' + visible + ' designs';
  let loadMore = document.getElementById('loadMoreBtn');
  if (shown < visible) {
    if (!loadMore) {
      loadMore = document.createElement('button');
      loadMore.id = 'loadMoreBtn';
      loadMore.className = 'btn';
      loadMore.style.cssText = 'display:block; margin: 1rem auto 2rem; padding: 10px 28px;';
      loadMore.textContent = 'Load More';
      loadMore.addEventListener('click', () => {
        showing += BATCH;
        updateResults();
      });
      document.getElementById('catalogGrid').after(loadMore);
    }
    loadMore.style.display = 'block';
  } else if (loadMore) {
    loadMore.style.display = 'none';
  }
  let noResults = document.getElementById('noResults');
  if (visible === 0) {
    if (!noResults) {
      noResults = document.createElement('p');
      noResults.id = 'noResults';
      noResults.className = 'no-results';
      noResults.textContent = 'No designs found. Try a different search or filter.';
      document.getElementById('catalogGrid').appendChild(noResults);
    }
  } else if (noResults) {
    noResults.remove();
  }
}

searchInput.addEventListener('input', () => { showing = BATCH; updateResults(); });
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    showing = BATCH;
    updateResults();
  });
});
updateResults();
 
</script>
</body>
</html>
